<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#6366f1">
  <title>枫桦清单 · 个人日程</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: {
              50:  '#eef2ff',
              100: '#e0e7ff',
              500: '#6366f1',
              600: '#4f46e5',
              700: '#4338ca',
            },
            q1: '#ef4444',
            q2: '#f59e0b',
            q3: '#3b82f6',
            q4: '#94a3b8',
          },
          fontFamily: {
            sans: ['-apple-system', 'BlinkMacSystemFont', '"Segoe UI"', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', 'sans-serif'],
          }
        }
      }
    }
  </script>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-slate-50 text-slate-800 font-sans antialiased">
  <div id="app" class="h-screen flex flex-col md:flex-row overflow-hidden">
    <!-- 1. Icon nav (desktop only) -->
    <aside id="icon-nav" class="hidden md:flex flex-col w-16 lg:w-20 bg-slate-800 text-slate-300 py-3 items-center gap-1 shrink-0">
      <div class="w-9 h-9 rounded-lg bg-gradient-to-br from-brand-500 to-indigo-700 flex items-center justify-center text-white font-bold text-sm mb-2 shrink-0">枫</div>
    </aside>

    <!-- 2. Group nav (desktop only, schedule route) -->
    <aside id="group-nav" class="hidden md:flex md:w-56 lg:w-64 flex-col bg-white border-r border-slate-200 shrink-0"></aside>

    <!-- 3. Main area -->
    <main class="flex-1 flex flex-col min-w-0 pb-20 md:pb-0 overflow-hidden">
      <header id="view-header" class="px-5 md:px-8 pt-6 pb-3 bg-white md:bg-transparent md:pt-8 border-b md:border-0 border-slate-200 shrink-0"></header>
      <div id="view-root" class="flex-1 overflow-y-auto px-5 md:px-8 pb-8"></div>
    </main>

    <!-- Mobile bottom nav -->
    <nav id="bottom-nav" class="md:hidden fixed bottom-0 inset-x-0 bg-white border-t border-slate-200 z-30"></nav>
  </div>

  <!-- Modal root -->
  <div id="modal-root"></div>

  <!-- Toast root -->
  <div id="toast-root" class="fixed bottom-24 md:bottom-6 inset-x-0 z-40 flex flex-col items-center gap-2 pointer-events-none px-4"></div>

  <script src="js/utils.js"></script>
  <script src="js/store.js"></script>
  <script src="js/icons.js"></script>
  <script src="js/views/schedule.js"></script>
  <script src="js/views/calendar.js"></script>
  <script src="js/views/matrix.js"></script>
  <script src="js/views/focus.js"></script>
  <script src="js/views/habits.js"></script>
  <script src="js/views/countdown.js"></script>
  <script src="js/views/notes.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
