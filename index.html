<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#6366f1">
  <title>枫桦清单 · 个人日程</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: {
              50:  '#eef2ff',
              100: '#e0e7ff',
              500: '#6366f1',
              600: '#4f46e5',
              700: '#4338ca',
            },
            q1: '#ef4444',
            q2: '#3b82f6',
            q3: '#f59e0b',
            q4: '#9ca3af',
          },
          fontFamily: {
            sans: ['-apple-system', 'BlinkMacSystemFont', '"Segoe UI"', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', 'sans-serif'],
          }
        }
      }
    }
  </script>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-slate-50 text-slate-800 font-sans antialiased">
  <div id="app" class="min-h-screen flex flex-col md:flex-row">
    <!-- Desktop sidebar -->
    <aside class="hidden md:flex md:w-56 lg:w-64 flex-col bg-white border-r border-slate-200">
      <div class="px-6 py-6 flex items-center gap-2">
        <div class="w-9 h-9 rounded-xl bg-gradient-to-br from-brand-500 to-indigo-700 flex items-center justify-center text-white font-bold">枫</div>
        <div>
          <div class="font-semibold text-slate-900">枫桦清单</div>
          <div class="text-xs text-slate-400">Maple Tasks</div>
        </div>
      </div>
      <nav id="side-nav" class="flex-1 px-3 space-y-1"></nav>
      <div class="p-3 border-t border-slate-100">
        <button id="reset-btn" class="w-full text-xs text-slate-400 hover:text-slate-600 py-2 rounded-md hover:bg-slate-50 transition">重置示例数据</button>
        <div class="text-[10px] text-slate-300 text-center mt-1">本地存储 · 云同步即将推出</div>
      </div>
    </aside>

    <!-- Main area -->
    <main class="flex-1 flex flex-col min-w-0 pb-20 md:pb-0">
      <header id="view-header" class="px-5 md:px-8 pt-6 pb-3 bg-white md:bg-transparent md:pt-8 border-b md:border-0 border-slate-200"></header>
      <div id="view-root" class="flex-1 overflow-y-auto px-5 md:px-8 pb-8"></div>
    </main>

    <!-- Mobile bottom nav -->
    <nav id="bottom-nav" class="md:hidden fixed bottom-0 inset-x-0 bg-white border-t border-slate-200 z-30"></nav>
  </div>

  <!-- Modal root -->
  <div id="modal-root"></div>

  <!-- Toast root -->
  <div id="toast-root" class="fixed bottom-24 md:bottom-6 inset-x-0 z-40 flex flex-col items-center gap-2 pointer-events-none px-4"></div>

  <script src="js/utils.js"></script>
  <script src="js/store.js"></script>
  <script src="js/icons.js"></script>
  <script src="js/views/schedule.js"></script>
  <script src="js/views/calendar.js"></script>
  <script src="js/views/matrix.js"></script>
  <script src="js/views/notes.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
